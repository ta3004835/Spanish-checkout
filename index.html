<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spanish Checkout App</title>
<style>
:root{
  --bg:#0f172a; --card:#1e293b; --text:#f1f5f9; --accent:#3b82f6;
}
body{margin:0;font-family:Arial;background:var(--bg);color:var(--text);display:flex;justify-content:center;padding:20px}
.container{width:500px}
.card{background:var(--card);padding:15px;border-radius:16px;margin-bottom:15px}
h2{margin-bottom:10px}
.item{display:flex;align-items:center;justify-content:space-between;margin:8px 0}
.item img{width:45px;height:45px;border-radius:8px;object-fit:cover}
.controls button{margin-left:5px}
button{border:none;border-radius:8px;padding:6px 10px;cursor:pointer;color:white}
.add{background:#22c55e}
.remove{background:#ef4444}
.checkout{background:var(--accent);width:100%;margin-top:10px}
ul{list-style:none;padding:0;max-height:120px;overflow:auto}
.total{display:flex;justify-content:space-between;margin-top:10px}
.receipt{display:none}
</style>
</head>
<body>
<div class="container">

<div class="card">
<h2>🍽️ Meals</h2>
<div class="item"><img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092"><span>Pollo $5</span><div class="controls"><button class="add" onclick="add('Pollo',5)">+</button><button class="remove" onclick="remove('Pollo',5)">-</button></div></div>
<div class="item"><img src="https://images.unsplash.com/photo-1617196038435-3e2f8efc0e6c"><span>Burrito $7</span><div class="controls"><button class="add" onclick="add('Burrito',7)">+</button><button class="remove" onclick="remove('Burrito',7)">-</button></div></div>
<div class="item"><img src="https://images.unsplash.com/photo-1605478371332-1d3b7d2d0a73"><span>Quesadilla $6</span><div class="controls"><button class="add" onclick="add('Quesadilla',6)">+</button><button class="remove" onclick="remove('Quesadilla',6)">-</button></div></div>
</div>

<div class="card">
<h2>🥤 Drinks</h2>
<div class="item"><img src="https://images.unsplash.com/photo-1585238342024-78d387f4a707"><span>Agua $2</span><div class="controls"><button class="add" onclick="add('Agua',2)">+</button><button class="remove" onclick="remove('Agua',2)">-</button></div></div>
<div class="item"><img src="https://images.unsplash.com/photo-1551024601-bec78aea704b"><span>Jugo $3</span><div class="controls"><button class="add" onclick="add('Jugo',3)">+</button><button class="remove" onclick="remove('Jugo',3)">-</button></div></div>
</div>

<div class="card">
<h2>🍟 Sides</h2>
<div class="item"><img src="https://images.unsplash.com/photo-1604908554027-1e3bcb35c50a"><span>Arroz $3</span><div class="controls"><button class="add" onclick="add('Arroz',3)">+</button><button class="remove" onclick="remove('Arroz',3)">-</button></div></div>
<div class="item"><img src="https://images.unsplash.com/photo-1625944525903-b7a8cdb2f6b5"><span>Nachos $5</span><div class="controls"><button class="add" onclick="add('Nachos',5)">+</button><button class="remove" onclick="remove('Nachos',5)">-</button></div></div>
<div class="item"><img src="https://images.unsplash.com/photo-1552332386-f8dd00dc2f85"><span>Tacos $4</span><div class="controls"><button class="add" onclick="add('Tacos',4)">+</button><button class="remove" onclick="remove('Tacos',4)">-</button></div></div>
<div class="item"><img src="https://images.unsplash.com/photo-1544025162-d76694265947"><span>Enchiladas $7</span><div class="controls"><button class="add" onclick="add('Enchiladas',7)">+</button><button class="remove" onclick="remove('Enchiladas',7)">-</button></div></div>
</div>

<div class="card">
<h2>🥤 Drinks</h2>
<div class="item"><img src="https://images.unsplash.com/photo-1600275669439-14e40452d20b"><span>Soda $2</span><div class="controls"><button class="add" onclick="add('Soda',2)">+</button><button class="remove" onclick="remove('Soda',2)">-</button></div></div>
<div class="item"><img src="https://images.unsplash.com/photo-1577805947697-89e18249d767"><span>Limonada $3</span><div class="controls"><button class="add" onclick="add('Limonada',3)">+</button><button class="remove" onclick="remove('Limonada',3)">-</button></div></div>
</div>

<div class="card">
<h2>🍟 Sides</h2>
<div class="item"><img src="https://images.unsplash.com/photo-1571091718767-18b5b1457add"><span>Papas Fritas $3</span><div class="controls"><button class="add" onclick="add('Papas Fritas',3)">+</button><button class="remove" onclick="remove('Papas Fritas',3)">-</button></div></div>
<div class="item"><img src="https://images.unsplash.com/photo-1598514982531-2b5c5f2d6f0d"><span>Guacamole $4</span><div class="controls"><button class="add" onclick="add('Guacamole',4)">+</button><button class="remove" onclick="remove('Guacamole',4)">-</button></div></div>
</div>

<div class="card">
<h2>🛒 Cart</h2>
<ul id="cart"></ul>
<div class="total"><span>Total:</span><span id="total">$0</span></div>
<button class="checkout" onclick="checkout()">Checkout</button>
</div>

<div class="card receipt" id="receipt">
<h2>🧾 Receipt</h2>
<ul id="receiptList"></ul>
<div class="total"><span>Total Paid:</span><span id="receiptTotal"></span></div>
</div>

</div>

<script>
let total=0;
let cartItems=[];

function add(name,price){
 total+=price;
 cartItems.push({name,price});
 render();
}

function remove(name,price){
 let index=cartItems.findIndex(i=>i.name===name);
 if(index>-1){
  total-=price;
  cartItems.splice(index,1);
  render();
 }
}

function render(){
 let cart=document.getElementById('cart');
 cart.innerHTML='';
 cartItems.forEach(i=>{
  let li=document.createElement('li');
  li.textContent=`${i.name} $${i.price}`;
  cart.appendChild(li);
 });
 document.getElementById('total').textContent='$'+total;
}

function checkout(){
 document.getElementById('receipt').style.display='block';
 let list=document.getElementById('receiptList');
 list.innerHTML='';
 cartItems.forEach(i=>{
  let li=document.createElement('li');
  li.textContent=`${i.name} $${i.price}`;
  list.appendChild(li);
 });
 document.getElementById('receiptTotal').textContent='$'+total;
 cartItems=[];
 total=0;
 render();
}
</script>

</body>
</html>
