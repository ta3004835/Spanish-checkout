<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spanish Class Checkout</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111;
      --item: #f0f3f8;
    }

    body.dark {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f1f5f9;
      --item: #334155;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body { background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; }

    .container {
      background: var(--card);
      width: 420px;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h1 { text-align: center; margin-bottom: 10px; }

    .toggle {
      text-align: right;
      margin-bottom: 10px;
    }

    .item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 10px 0;
      padding: 10px;
      border-radius: 10px;
      background: var(--item);
    }

    .item img {
      width: 50px;
      height: 50px;
      border-radius: 8px;
      object-fit: cover;
    }

    .controls {
      display: flex;
      gap: 5px;
    }

    button {
      border: none;
      padding: 6px 10px;
      border-radius: 8px;
      cursor: pointer;
      color: white;
    }

    .add { background: #22c55e; }
    .remove { background: #f97316; }
    .reset { background: #ef4444; flex: 1; }
    .checkout { background: #3b82f6; flex: 1; }

    ul {
      margin-top: 10px;
      list-style: none;
      max-height: 100px;
      overflow-y: auto;
      border: 1px solid #555;
      border-radius: 8px;
      padding: 5px;
    }

    .total {
      margin-top: 15px;
      display: flex;
      justify-content: space-between;
      font-size: 18px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="toggle">
      <button onclick="toggleDark()">🌙 Toggle</button>
    </div>

    <h1>🍽️ Checkout Español</h1>

    <div class="item">
      <img src="https://images.unsplash.com/photo-1604908554027-1e3bcb35c50a" />
      <span>Arroz - $3</span>
      <div class="controls">
        <button class="add" onclick="addItem('Arroz',3)">+</button>
        <button class="remove" onclick="removeItem('Arroz',3)">-</button>
      </div>
    </div>

    <div class="item">
      <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092" />
      <span>Pollo - $5</span>
      <div class="controls">
        <button class="add" onclick="addItem('Pollo',5)">+</button>
        <button class="remove" onclick="removeItem('Pollo',5)">-</button>
      </div>
    </div>

    <div class="item">
      <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c" />
      <span>Combo - $8</span>
      <div class="controls">
        <button class="add" onclick="addItem('Combo',8)">+</button>
        <button class="remove" onclick="removeItem('Combo',8)">-</button>
      </div>
    </div>

    <ul id="cart"></ul>

    <div class="total">
      <span>Total:</span>
      <span id="total">$0</span>
    </div>

    <div class="actions">
      <button class="reset" onclick="resetCart()">Reset</button>
      <button class="checkout" onclick="checkout()">Checkout</button>
    </div>
  </div>

  <script>
    let total = 0;

    function addItem(name, price) {
      total += price;
      const li = document.createElement('li');
      li.textContent = `${name} +$${price}`;
      document.getElementById('cart').appendChild(li);
      updateTotal();
    }

    function removeItem(name, price) {
      if (total >= price) {
        total -= price;
        const li = document.createElement('li');
        li.textContent = `${name} -$${price}`;
        document.getElementById('cart').appendChild(li);
        updateTotal();
      }
    }

    function updateTotal() {
      document.getElementById('total').textContent = `$${total}`;
    }

    function resetCart() {
      total = 0;
      document.getElementById('cart').innerHTML = '';
      updateTotal();
    }

    function checkout() {
      alert('Gracias! Total: $' + total);
      resetCart();
    }

    function toggleDark() {
      document.body.classList.toggle('dark');
    }
  </script>
</body>
</html>
